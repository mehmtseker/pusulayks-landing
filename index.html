<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #0B1120; font-family: 'Inter', sans-serif; color: #E2E8F0; overflow-x: hidden; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0B1120; }
  ::-webkit-scrollbar-thumb { background: #2D3A52; border-radius: 3px; }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes pulse-glow { 0%,100%{box-shadow:0 0 20px rgba(79,70,229,.3)} 50%{box-shadow:0 0 40px rgba(79,70,229,.6)} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes draw-line { from{stroke-dashoffset:300} to{stroke-dashoffset:0} }
  @keyframes count-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fade-in-up { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes slide-in-right { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes neon-pulse { 0%,100%{text-shadow:0 0 20px rgba(79,70,229,.5)} 50%{text-shadow:0 0 40px rgba(79,70,229,.9),0 0 80px rgba(124,58,237,.4)} }
  @keyframes progress-fill { from{width:0} to{width:var(--w)} }
  @keyframes dash-anim { to{stroke-dashoffset:-20} }

  .animate-float { animation: float 4s ease-in-out infinite; }
  .animate-fade-up { animation: fade-in-up .7s ease forwards; }
  .animate-slide-right { animation: slide-in-right .7s ease forwards; }

  .glass {
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.08);
  }
  .glass-strong {
    background: rgba(30,41,59,.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.1);
  }
  .gradient-text {
    background: linear-gradient(135deg, #818CF8, #4F46E5, #7C3AED);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .gradient-btn {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    transition: all .3s ease;
    position: relative;
    overflow: hidden;
  }
  .gradient-btn::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, #6366F1, #9333EA);
    opacity:0; transition: opacity .3s;
  }
  .gradient-btn:hover::after { opacity:1; }
  .gradient-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(79,70,229,.5); }

  .feature-card {
    transition: all .35s cubic-bezier(.25,.46,.45,.94);
    cursor: default;
  }
  .feature-card:hover {
    transform: translateY(-6px);
    border-color: rgba(79,70,229,.4) !important;
    box-shadow: 0 20px 60px rgba(79,70,229,.15), 0 0 0 1px rgba(79,70,229,.2);
  }
  .step-line { background: linear-gradient(180deg, #4F46E5 0%, transparent 100%); }

  .testimonial-card:hover {
    transform: translateY(-4px);
    border-color: rgba(99,102,241,.3) !important;
  }
  .testimonial-card { transition: all .3s ease; }

  .nav-link { transition: color .2s; }
  .nav-link:hover { color: #818CF8; }

  .progress-bar-fill {
    animation: progress-fill 1.5s ease forwards;
  }
  .chart-line {
    stroke-dasharray: 300;
    animation: draw-line 2s ease forwards;
  }

  /* ── Scroll reveal ── */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity .75s cubic-bezier(.22,1,.36,1), transform .75s cubic-bezier(.22,1,.36,1);
  }
  .reveal.left  { transform: translateX(-44px); }
  .reveal.right { transform: translateX(44px); }
  .reveal.scale { transform: scale(.92) translateY(24px); }
  .reveal.visible { opacity: 1 !important; transform: none !important; }
  .d1 { transition-delay: .08s !important; }
  .d2 { transition-delay: .16s !important; }
  .d3 { transition-delay: .24s !important; }
  .d4 { transition-delay: .32s !important; }
  .d5 { transition-delay: .40s !important; }
  .d6 { transition-delay: .48s !important; }

  /* ── Mobile Responsiveness ── */
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr !important; gap: 40px !important; text-align: center; }
    .hero-grid > div:first-child p { margin: 0 auto 32px auto !important; }
    .hero-cta-container { justify-content: center !important; }
    .hero-stats-container { justify-content: center !important; }
    
    .features-grid { grid-template-columns: 1fr !important; }
    
    .how-it-works-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .how-it-works-line { display: none !important; }
    
    .social-proof-grid { grid-template-columns: 1fr !important; }
    
    .pricing-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    
    .nav-links { display: none !important; }
    .nav-inner { padding: 0 16px !important; }
    
    .footer-container { flex-direction: column !important; text-align: center !important; gap: 20px !important; }
    
    section { padding: 60px 16px !important; }
    .hero-section { padding: 100px 16px 40px !important; }

    .app-mockup-wrapper { position: relative !important; width: 100% !important; display: block !important; height: 350px; }
    .app-mockup-scale { transform: scale(0.8); transform-origin: center top; width: 100%; height: 100%; display: block !important; }
    .app-mockup-float { width: 100%; height: 100%; display: block !important; }
    .app-mockup-inner { position: absolute !important; left: 50% !important; top: 0 !important; margin-left: -290px !important; max-width: none !important; width: 580px !important; }
  }

  @media (max-width: 600px) {
    .app-mockup-scale { transform: scale(0.65); }
    .app-mockup-wrapper { height: 280px; }
  }

  @media (max-width: 480px) {
    .app-mockup-scale { transform: scale(0.55); }
    .app-mockup-wrapper { height: 240px; }
    .hero-cta-container { flex-direction: column; }
    .hero-stats-container { flex-wrap: wrap; }
    .nav-brand-text { font-size: 16px !important; }
    .final-cta-form { flex-direction: column; }
  }
</style>
</head>
<body>

<script type="text/babel">

const IconCompass = () => (

/* ─── MINI DASHBOARD MOCKUP ─── */
function MiniDashboard() {
  const [activeTab, setActiveTab] = useState('yol');
  const tabs = [{id:'yol',label:'Yol Haritası'},{id:'analiz',label:'Net Analizi'},{id:'plan',label:'AI Planlayıcı'}];

  return (
    <div className="app-mockup-inner" style={{
      background:'#0F172A', borderRadius:16, overflow:'hidden',
      border:'1px solid rgba(255,255,255,.1)',
      boxShadow:'0 40px 120px rgba(0,0,0,.8), 0 0 0 1px rgba(79,70,229,.2)',
      width:'100%', maxWidth:580
    }}>
      {/* Titlebar */}
      <div style={{background:'#1a2540', padding:'10px 16px', display:'flex', alignItems:'center', gap:12, borderBottom:'1px solid rgba(255,255,255,.07)'}}>
        <div style={{display:'flex',gap:6}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#FF5F57'}}/>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#FFBD2E'}}/>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#28CA41'}}/>
        </div>
        <div style={{display:'flex',gap:4,marginLeft:8}}>

            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{

              border: activeTab===t.id ? '1px solid rgba(79,70,229,.5)' : '1px solid transparent',
              color: activeTab===t.id ? '#818CF8' : '#64748B',
              padding:'3px 10px', borderRadius:6, fontSize:11, cursor:'pointer', transition:'all .2s', fontFamily:'Inter,sans-serif'

          ))}
        </div>
        <div style={{marginLeft:'auto', background:'linear-gradient(135deg,#4F46E5,#7C3AED)', padding:'4px 12px', borderRadius:6, fontSize:11, color:'white', fontFamily:'Inter,sans-serif', fontWeight:600}}>
          ✦ Plan Oluştur
        </div>
      </div>

      {/* Content */}
      <div style={{padding:16, height:320}}>
        {activeTab === 'yol' && <YolHaritasiView />}
        {activeTab === 'analiz' && <NetAnaliziView />}
        {activeTab === 'plan' && <AIPlanlayiciView />}

}

function YolHaritasiView() {
  const weeks = [
    {range:'20 Nis – 26 Nis', net:'+8.1', active:true},
    {range:'27 Nis – 3 May', net:'+7.8', active:false},
    {range:'4 May – 10 May', net:'+12.4', active:false},
    {range:'11 May – 17 May', net:'+8.8', active:false},
  ];
  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, height:'100%'}}>
      <div>
        <div style={{fontSize:10, color:'#4F46E5', fontWeight:700, marginBottom:8, letterSpacing:'0.1em'}}>HAFTALIK AKIŞ</div>
        {weeks.map((w,i) => (
          <div key={i} style={{
            background: w.active ? 'rgba(79,70,229,.15)' : 'rgba(255,255,255,.03)',
            border: `1px solid ${w.active ? 'rgba(79,70,229,.4)' : 'rgba(255,255,255,.06)'}`,
            borderRadius:8, padding:'8px 10px', marginBottom:6,
            display:'flex', alignItems:'center', justifyContent:'space-between'
          }}>
            <div>
              {w.active && <div style={{width:8,height:8,borderRadius:'50%',background:'#4F46E5',display:'inline-block',marginRight:6}}/>}
              <span style={{fontSize:11, color: w.active ? '#E2E8F0' : '#64748B', fontWeight: w.active ? 600 : 400}}>{w.range}</span>
            </div>
            <span style={{fontSize:11, color:'#22C55E', fontWeight:700}}>{w.net} Net</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:8}}>
        <div style={{background:'rgba(255,255,255,.04)', borderRadius:8, padding:10, border:'1px solid rgba(255,255,255,.06)', flex:1}}>
          <div style={{fontSize:9, color:'#4F46E5', fontWeight:700, marginBottom:6, letterSpacing:'0.1em'}}>NET PROJEKTÖR</div>
          <MiniChart />
        </div>
        <div style={{background:'rgba(255,255,255,.04)', borderRadius:8, padding:10, border:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{fontSize:9, color:'#94A3B8', marginBottom:4}}>TAHMİNİ BİTİŞ</div>
          <div style={{display:'flex', gap:16}}>
            <div><div style={{fontSize:20, fontWeight:800, color:'#818CF8'}}>53<span style={{fontSize:12}}>g</span></div><div style={{fontSize:9,color:'#64748B'}}>YKS'ye</div></div>
            <div><div style={{fontSize:20, fontWeight:800, color:'#22C55E'}}>86</div><div style={{fontSize:9,color:'#64748B'}}>Konu Tamam</div></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function MiniChart() {
  const tytPoints = "10,80 30,72 50,65 70,55 90,48 110,38 130,25 150,18";
  const projPoints = "150,18 170,12 190,8 210,4";
  return (
    <svg viewBox="0 0 220 90" style={{width:'100%',height:80}}>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#22C55E" stopOpacity=".4"/>
          <stop offset="100%" stopColor="#22C55E" stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#818CF8" stopOpacity=".3"/>
          <stop offset="100%" stopColor="#818CF8" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`10,80 ${tytPoints} 150,90 10,90`} fill="url(#g1)" opacity=".6"/>
      <polyline points={tytPoints} fill="none" stroke="#22C55E" strokeWidth="2" strokeLinecap="round" className="chart-line"/>
      <polyline points={projPoints} fill="none" stroke="#818CF8" strokeWidth="1.5" strokeDasharray="4 3" strokeLinecap="round"/>
      <text x="4" y="10" fontSize="7" fill="#64748B">TYT</text>
      <text x="155" y="10" fontSize="7" fill="#64748B">Proj</text>
    </svg>
  );
}

function NetAnaliziView() {
  const branches = [
    {name:'TYT Matematik', correct:18, wrong:4, color:'#4F46E5'},
    {name:'TYT Türkçe', correct:28, wrong:2, color:'#22C55E'},
    {name:'AYT Fizik', correct:8, wrong:7, color:'#F59E0B'},
    {name:'AYT Kimya', correct:12, wrong:5, color:'#EC4899'},
  ];
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:10,color:'#4F46E5',fontWeight:700,letterSpacing:'0.1em'}}>DENEME ANALİZİ</div>
        <div style={{background:'rgba(79,70,229,.2)',border:'1px solid rgba(79,70,229,.4)',borderRadius:6,padding:'3px 10px',fontSize:10,color:'#818CF8',fontWeight:600}}>Net: 120.00</div>
      </div>
      {branches.map((b,i) => {
        const net = b.correct - b.wrong/4;
        const pct = Math.round((b.correct/(b.correct+b.wrong))*100);
        return (
          <div key={i} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontSize:11,color:'#94A3B8'}}>{b.name}</span>
              <span style={{fontSize:11,color:b.color,fontWeight:600}}>+{net.toFixed(1)} net</span>
            </div>
            <div style={{height:4,background:'rgba(255,255,255,.07)',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct}%`,background:b.color,borderRadius:4,transition:'width 1s ease'}}/>
            </div>
          </div>
        );
      })}
      <div style={{marginTop:12,background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.2)',borderRadius:8,padding:'8px 10px'}}>
        <div style={{fontSize:10,color:'#22C55E',fontWeight:700}}>🤖 YZ ANALİZİ</div>
        <div style={{fontSize:10,color:'#94A3B8',marginTop:3}}>Geometri konularında ilerleme diğer branşlara göre daha düşük.</div>
      </div>
    </div>
  );
}

function AIPlanlayiciView() {
  const days = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const tasks = [null, null, [{s:'Geometri',c:'#4F46E5'},{s:'Fizik',c:'#22C55E'}], [{s:'Türkçe',c:'#F59E0B'}], null, [{s:'Kimya',c:'#EC4899'},{s:'Mat',c:'#4F46E5'}], null];
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div>
          <div style={{fontSize:10,color:'#4F46E5',fontWeight:700,letterSpacing:'0.1em'}}>HAFTALIK AKILLI PLANLAYICI</div>
          <div style={{fontSize:9,color:'#64748B'}}>Yapay zeka tarafından önerilen</div>
        </div>
        <div style={{background:'rgba(34,197,94,.2)',border:'1px solid rgba(34,197,94,.4)',borderRadius:6,padding:'3px 8px',fontSize:9,color:'#22C55E',fontWeight:700}}>✓ ONAYLA</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
        {days.map((d,i) => (
          <div key={i}>
            <div style={{textAlign:'center',fontSize:9,color: i===2 ? '#818CF8' : '#64748B',marginBottom:3,fontWeight: i===2 ? 700 : 400}}>{d}</div>
            <div style={{
              background: i===2 ? 'rgba(79,70,229,.15)' : 'rgba(255,255,255,.03)',
              border:`1px solid ${i===2 ? 'rgba(79,70,229,.4)' : 'rgba(255,255,255,.06)'}`,
              borderRadius:6, padding:'4px 3px', minHeight:70, display:'flex', flexDirection:'column', gap:2
            }}>
              {tasks[i] ? tasks[i].map((t,j) => (
                <div key={j} style={{background:t.c+'33',border:`1px solid ${t.c}66`,borderRadius:3,padding:'2px 3px',fontSize:8,color:t.c,fontWeight:600,textAlign:'center'}}>{t.s}</div>
              )) : <div style={{fontSize:8,color:'#1E293B',textAlign:'center',marginTop:8}}>—</div>}
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:10,background:'rgba(255,255,255,.03)',borderRadius:8,padding:'8px',border:'1px solid rgba(255,255,255,.06)',display:'flex',gap:8,alignItems:'center'}}>
        <div style={{width:24,height:24,borderRadius:'50%',background:'linear-gradient(135deg,#4F46E5,#7C3AED)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0}}>🤖</div>
        <div style={{fontSize:10,color:'#94A3B8'}}>Saat 23:04 virajındayız! Geometri bloğuna odaklan.</div>
      </div>
    </div>
  );
}

/* ─── NAVBAR ─── */
function Navbar({ tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:100,
      background: scrolled ? 'rgba(11,17,32,.95)' : 'transparent',
      backdropFilter: scrolled ? 'blur(20px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,.08)' : 'none',
      transition:'all .3s ease',
      padding:'0 24px',
    }}>
      <div className="nav-inner" style={{maxWidth:1200, margin:'0 auto', height:64, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <img src="./favicon.png" alt="Pusula YKS" style={{height:48, width:'auto', objectFit:'contain'}} />
          <span className="nav-brand-text" style={{fontWeight:800, fontSize:18, letterSpacing:'-0.02em'}}>Pusula <span style={{color:'#818CF8'}}>YKS</span></span>
        </div>

/* ─── SCROLL REVEAL HOOK ─── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ─── APP ─── */
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    if (tweaksVisible) {
      window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
      const root = document.documentElement;
      root.style.setProperty('--accent', tweaks.accentColor);
    }
  }, [tweaks, tweaksVisible]);

  return (
    <>
      <Navbar tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <Features />
      <HowItWorks />
      <SocialProof tweaks={tweaks} />
      <Pricing />
      <FinalCTA tweaks={tweaks} />
      <Footer />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}
